services:
  team4sv30-frontend:
    command: npm run dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
      - ./media:/media

volumes:
  frontend_node_modules:
  frontend_next:
