openapi: 3.0.3
info:
  title: Team4s Contributions API
  version: 1.0.0
  description: |
    OpenAPI contract for member contribution proposal and leader review endpoints.
    Phase 65: member-vorschläge-review-queue.

tags:
  - name: Contributions
    description: Member contribution proposals and review queue endpoints.

paths:
  /api/v1/me/memberships:
    get:
      tags: [Contributions]
      summary: List own group memberships
      description: Returns the authenticated member's hist_fansub_group_members entries with fansub_group_member_id. Used to populate the group dropdown in ProposalForm.
      operationId: getMyMemberships
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of membership entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipsResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notAuthenticated:
                  value:
                    error:
                      message: "anmeldung erforderlich"
        "404":
          description: No verified member account linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/me/contribution-proposals:
    post:
      tags: [Contributions]
      summary: Create a contribution proposal
      description: |
        Submits a new anime contribution proposal for a group the member belongs to.
        The proposal remains in 'proposed' state until a group leader confirms or rejects it.
        Returns 409 if an identical proposal (same member + anime + group combination) already exists.
      operationId: createContributionProposal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalFormData"
      responses:
        "201":
          description: Proposal created successfully
        "400":
          description: Invalid request (e.g. missing required fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Member does not belong to the specified group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    error:
                      message: "keine Berechtigung"
        "409":
          description: Duplicate proposal (same member + anime + group already exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicate:
                  value:
                    error:
                      message: "Für diese Kombination aus Gruppe, Anime und deiner Identität existiert bereits ein Beitrag."
        "422":
          description: Validation error (e.g. no role_codes provided)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                noRoles:
                  value:
                    error:
                      message: "Bitte wähle mindestens eine Rolle aus."

  /api/v1/me/anime-contributions/{contributionId}/self-publish:
    post:
      tags: [Contributions]
      summary: Self-publish a contribution after 90-day timeout
      description: |
        Allows the member to self-publish a proposed contribution as an unverified historical entry
        after 90 days without a group leader response. Backend re-validates the 90-day window.
        Returns 409 if not yet eligible (less than 90 days since proposal).
      operationId: selfPublishContribution
      security:
        - bearerAuth: []
      parameters:
        - name: contributionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: The contribution ID to self-publish.
      responses:
        "200":
          description: Contribution self-published successfully
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Contribution does not belong to the authenticated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Contribution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 90-day timeout not yet elapsed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                tooEarly:
                  value:
                    error:
                      message: "Vorschlag kann noch nicht selbst veröffentlicht werden. 90 Tage müssen seit Einreichung vergangen sein."

  /api/v1/admin/fansubs/{fansubId}/contribution-proposals:
    get:
      tags: [Contributions]
      summary: List open contribution proposals for a group
      description: |
        Returns all 'proposed' contributions for the specified fansub group.
        Requires CanForFansubGroup (MembersManage) permission.
      operationId: listGroupContributionProposals
      security:
        - bearerAuth: []
      parameters:
        - name: fansubId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: The fansub group ID.
      responses:
        "200":
          description: List of open proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupProposalsResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient group permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/fansubs/{fansubId}/contribution-proposals/{cid}/confirm:
    post:
      tags: [Contributions]
      summary: Confirm a contribution proposal
      description: |
        Confirms a proposed contribution, setting status to 'confirmed' and enabling visibility flags.
        Requires CanForFansubGroup (MembersManage) permission. Writes audit log entry.
      operationId: confirmContributionProposal
      security:
        - bearerAuth: []
      parameters:
        - name: fansubId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: cid
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: The contribution proposal ID to confirm.
      responses:
        "200":
          description: Proposal confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Vorschlag wurde bestätigt."
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient group permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Contribution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/fansubs/{fansubId}/contribution-proposals/{cid}/reject:
    post:
      tags: [Contributions]
      summary: Reject a contribution proposal
      description: |
        Rejects a proposed contribution, setting status to 'disputed'. Optionally stores a review_note
        as rejection reason. No hard delete — the record remains for audit. Writes audit log entry.
        Requires CanForFansubGroup (MembersManage) permission.
      operationId: rejectContributionProposal
      security:
        - bearerAuth: []
      parameters:
        - name: fansubId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: cid
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: The contribution proposal ID to reject.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                review_note:
                  type: string
                  nullable: true
                  description: Optional rejection reason shown to the member.
                  example: "Konnte nicht verifiziert werden."
      responses:
        "200":
          description: Proposal rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Vorschlag wurde abgelehnt."
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient group permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Contribution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SignedToken

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string

    MembershipEntry:
      type: object
      required: [fansub_group_member_id, fansub_group_id, group_name]
      properties:
        fansub_group_member_id:
          type: integer
          format: int64
          description: The hist_fansub_group_members primary key.
        fansub_group_id:
          type: integer
          format: int64
          description: The fansub group ID.
        group_name:
          type: string
          description: Display name of the fansub group.

    MembershipsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MembershipEntry"

    ProposalFormData:
      type: object
      required: [fansub_group_id, anime_id, fansub_group_member_id, role_codes]
      properties:
        fansub_group_id:
          type: integer
          format: int64
          minimum: 1
        anime_id:
          type: integer
          format: int64
          minimum: 1
        fansub_group_member_id:
          type: integer
          format: int64
          minimum: 1
          description: The hist_fansub_group_members ID — links the proposal to the member's group membership record.
        role_codes:
          type: array
          minItems: 1
          items:
            type: string
          description: At least one role_code from role_definitions (context='anime_contribution') required.
          example: ["translator", "editor"]
        note:
          type: string
          nullable: true
          description: Optional free-text note from the member.
        started_year:
          type: integer
          nullable: true
          minimum: 1900
        ended_year:
          type: integer
          nullable: true
          minimum: 1900
        release_version_id:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Optional release-version scope; when provided, the selected fansub group must participate in the release version.

    GroupProposalRow:
      type: object
      required: [id, fansub_group_member_id, member_display_name, anime_id, anime_title, role_codes, created_at]
      properties:
        id:
          type: integer
          format: int64
        fansub_group_member_id:
          type: integer
          format: int64
        member_display_name:
          type: string
        anime_id:
          type: integer
          format: int64
        anime_title:
          type: string
        role_codes:
          type: array
          items:
            type: string
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    GroupProposalsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GroupProposalRow"

    # Public Member-Rollen-Timeline (GET /api/v1/members/:slug/contributions).
    # Quelle der Wahrheit ist das Backend-Struct PublicMemberRoleEntry in
    # backend/internal/repository/anime_contributions_public_repository.go (Lock K).
    # Phase 74: GAP-3 (group_history aus aktuellen App-Gruppenrollen) + GAP-2 (notes).
    PublicMemberRoleEntry:
      type: object
      required: [fansub_group_name, fansub_group_slug, role_code, role_label, context, status]
      properties:
        fansub_group_name:
          type: string
        fansub_group_slug:
          type: string
        role_code:
          type: string
        role_label:
          type: string
          description: Lokalisiertes Label (role_definitions.label_de) mit Fallback auf role_code.
        context:
          type: string
          enum: [group_history, anime_contribution]
          description: group_history = Gruppen-/App-Rolle; anime_contribution = anime-spezifischer Beitrag.
        anime_title:
          type: string
          nullable: true
        anime_id:
          type: integer
          format: int64
          nullable: true
        started_year:
          type: integer
          nullable: true
        ended_year:
          type: integer
          nullable: true
        status:
          type: string
        notes:
          type: string
          nullable: true
          description: Detailtext aus anime_contributions.note (nur context='anime_contribution'); sonst null. Quelle für den Inline-Expand.

    PublicMemberContributionsResponse:
      type: object
      required: [role_timeline, has_unverified]
      properties:
        role_timeline:
          type: array
          items:
            $ref: "#/components/schemas/PublicMemberRoleEntry"
        has_unverified:
          type: boolean
