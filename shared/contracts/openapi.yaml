components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SignedToken
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            code:
              type: string
              description: Optional machine-readable error code for lane-specific client handling.
            details:
              type: string
              description: Optional operator-facing hint with concrete remediation context.
    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    AuthRevokeRequest:
      type: object
      properties:
        refresh_token:
          type: string
    AuthTokenData:
      type: object
      required:
        - token_type
        - access_token
        - access_token_expires_at
        - access_token_expires_in
        - refresh_token
        - refresh_token_expires_at
        - refresh_token_expires_in
        - user_id
        - display_name
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        access_token_expires_at:
          type: integer
          format: int64
        access_token_expires_in:
          type: integer
          format: int64
        refresh_token:
          type: string
        refresh_token_expires_at:
          type: integer
          format: int64
        refresh_token_expires_in:
          type: integer
          format: int64
        user_id:
