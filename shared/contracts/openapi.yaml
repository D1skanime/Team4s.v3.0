openapi: 3.0.3
info:
  title: Team4s v3 API
  version: 0.1.0
  description: |
    Baseline OpenAPI contract for current endpoints, including admin content-management routes.
  license:
    name: Proprietary
    url: https://team4s.dev/license
servers:
  - url: /
    description: Relative API base
tags:
  - name: Health
    description: Service health and availability checks.
  - name: Auth
    description: Access token lifecycle endpoints.
  - name: Anime
    description: Anime listing and detail endpoints.
  - name: Comments
    description: Anime comment endpoints.
  - name: Watchlist
    description: User watchlist endpoints.
  - name: Profile
    description: Own member profile and identity hub endpoints.
  - name: Episodes
    description: Episode detail endpoints.
  - name: Fansubs
    description: Fansub groups, members, and anime relation endpoints.
  - name: Releases
    description: Proxy endpoints for episode release streaming and media images.
  - name: Admin
    description: Admin content management endpoints (P2).
security: []
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/issue:
    post:
      tags: [Auth]
      summary: Issue access and refresh token pair
      description: |
        Trusted identity source contract:
        - Non-dev deployments: `Authorization: Bearer <signed token>` is required.
        - Local development only: server-side fallback identity may be used when `AUTH_ISSUE_DEV_MODE=true`.
        - `X-Auth-Issue-Key` is only evaluated for the dev fallback path when `AUTH_ISSUE_DEV_KEY` is configured.
      operationId: issueAuthToken
      parameters:
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
          description: |
            Trusted identity source for non-dev deployments (`Bearer <signed token>` required outside local dev fallback mode).
        - in: header
          name: X-Auth-Issue-Key
          required: false
          schema:
            type: string
          description: Optional local dev fallback gate key; ignored unless `AUTH_ISSUE_DEV_MODE=true` and `AUTH_ISSUE_DEV_KEY` is configured.
      responses:
        "201":
          description: Issued access and refresh token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          description: Missing trusted identity source for active profile or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                required:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access and refresh token pair
      operationId: refreshAuthToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
            examples:
              default:
                value:
                  refresh_token: <refresh-token>
      responses:
        "200":
          description: Rotated access and refresh token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
                missingRefreshToken:
                  value:
                    error:
                      message: refresh_token ist erforderlich
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidRefreshToken:
                  value:
                    error:
                      message: ungueltiges refresh-token
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/revoke:
    post:
      tags: [Auth]
      summary: Revoke active access token and session
      operationId: revokeAuthToken
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRevokeRequest"
            examples:
              default:
                value:
                  refresh_token: <refresh-token>
      responses:
        "204":
          description: Session revoked
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/profile:
    get:
      tags: [Profile]
      summary: Get own member profile aggregate
      operationId: getOwnProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Own profile aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfileResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
        "404":
          description: Profile bridge or member profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: profil wurde nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Profile]
      summary: Update own Team4s member profile fields
      description: |
        Updates Team4s-owned profile fields only. Keycloak-owned identity fields
        such as e-mail and subject are read-only and rejected if submitted.
      operationId: updateOwnProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberProfileRequest"
      responses:
        "200":
          description: Updated own profile aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfileResponse"
        "400":
          description: Invalid profile fields or read-only identity fields submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidFields:
                  value:
                    error:
                      message: profilfelder sind ungueltig
                readonlyIdentity:
                  value:
                    error:
                      message: e-mail und keycloak-identitaet sind hier nur lesbar
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Disabled app users cannot mutate their profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                disabledUser:
                  value:
                    error:
                      message: deaktivierte benutzer duerfen ihr profil nicht aendern
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/profile/avatar:
    post:
      tags: [Profile]
      summary: Upload own member profile avatar
      operationId: uploadOwnProfileAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadOwnProfileAvatarRequest"
      responses:
        "200":
          description: Profile aggregate with updated avatar media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfileResponse"
        "400":
          description: Missing, invalid, unreadable, or oversized avatar file. Runtime allows JPG, PNG, and WEBP only; SVG is rejected. The existing shared image limit is 50 MB.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingFile:
                  value:
                    error:
                      message: keine datei hochgeladen
                invalidType:
                  value:
                    error:
                      message: nur bilddateien sind als avatar erlaubt
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Disabled app users cannot upload avatars
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                disabledUser:
                  value:
                    error:
                      message: deaktivierte benutzer duerfen keinen avatar hochladen
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/anime:
    get:
      tags: [Anime]
      summary: List anime
      operationId: listAnime
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 24
        - name: q
          in: query
          description: Search string (substring match) applied to title fields.
          schema:
            type: string
            maxLength: 100
            example: attack
        - name: letter
          in: query
          description: Uppercase A-Z, "0" for numeric titles, or omitted for all.
          schema:
            type: string
            pattern: '^[A-Z0]|$'
            example: A
        - name: content_type
          in: query
          schema:
            $ref: "#/components/schemas/ContentType"
        - name: status
          in: query
          description: Optional status filter. "disabled" values are only returned when include_disabled=true.
          schema:
            $ref: "#/components/schemas/AnimeStatus"
        - name: fansub_id
          in: query
          description: Optional filter for anime that are linked to a specific fansub group.
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: include_disabled
          in: query
          description: Include disabled/preseed anime rows in responses. Default false.
          schema:
            type: boolean
            default: false
        - name: has_cover
          in: query
          description: Optional filter for cover_image presence. true = only records with cover_image, false = only records without cover_image.
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated anime list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAnimeResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPage:
                  value:
                    error:
                      message: ungueltiger page parameter
                invalidQuery:
                  value:
                    error:
                      message: ungueltiger q parameter
                invalidFansubID:
                  value:
                    error:
                      message: ungueltiger fansub_id parameter
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/anime/{id}:
    get:
      tags: [Anime]
      summary: Get anime detail
      operationId: getAnimeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: include_disabled
          in: query
          description: Include disabled/preseed anime rows in detail lookup. Default false.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Anime detail payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeDetailResponse"
        "400":
          description: Invalid anime id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidId:
                  value:
                    error:
                      message: ungueltige anime id
        "404":
          description: Anime not found or disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: anime nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/anime/{id}/backdrops:
    get:
      tags: [Anime]
      summary: Resolve Jellyfin backdrop and theme-video candidates for anime detail background
      operationId: listAnimeBackdrops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Backdrop and theme-video candidate URLs (can be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeBackdropResponse"
        "400":
          description: Invalid anime id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidId:
                  value:
                    error:
                      message: ungueltige anime id
        "404":
          description: Anime not found or disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: anime nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/anime/{id}/comments:
    get:
      tags: [Comments]
      summary: List comments for anime
      operationId: listAnimeComments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated comment list for anime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCommentResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidId:
                  value:
                    error:
                      message: ungueltige anime id
                invalidPage:
                  value:
                    error:
                      message: ungueltiger page parameter
                invalidPerPage:
                  value:
                    error:
                      message: ungueltiger per_page parameter
        "404":
          description: Anime not found or disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: anime nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Comments]
      summary: Create comment for anime
      operationId: createAnimeComment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
            examples:
              default:
                value:
                  content: Danke fuer den Release!
      responses:
        "201":
          description: Created comment payload
          headers:
            X-Comment-RateLimit-Degraded:
              description: Present with `true` when rate limit store is unavailable and limiter runs in degraded mode.
              schema:
                type: string
                enum: ["true"]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentCreateResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidId:
                  value:
                    error:
                      message: ungueltige anime id
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
                missingContent:
                  value:
                    error:
                      message: content ist erforderlich
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "404":
          description: Anime not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: anime nicht gefunden
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "429":
          description: Rate limit exceeded for comment creation
          headers:
            Retry-After:
              description: Seconds until the next comment create request is allowed.
              schema:
                type: integer
                format: int32
                minimum: 1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                rateLimitExceeded:
                  value:
                    error:
                      message: zu viele anfragen, bitte spaeter erneut versuchen
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/watchlist:
    get:
      tags: [Watchlist]
      summary: List watchlist entries
      operationId: listWatchlist
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated watchlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWatchlistResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPage:
                  value:
                    error:
                      message: ungueltiger page parameter
                invalidPerPage:
                  value:
                    error:
                      message: ungueltiger per_page parameter
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Watchlist]
      summary: Add anime to watchlist
      operationId: createWatchlistEntry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistCreateRequest"
            examples:
              default:
                value:
                  anime_id: 1
      responses:
        "201":
          description: Created watchlist entry payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistCreateResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
                invalidAnimeID:
                  value:
                    error:
                      message: anime_id ist erforderlich
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "404":
          description: Anime not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: anime nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/watchlist/{anime_id}:
    get:
      tags: [Watchlist]
      summary: Get watchlist entry for anime
      operationId: getWatchlistEntry
      security:
        - bearerAuth: []
      parameters:
        - name: anime_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Watchlist entry payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistCreateResponse"
        "400":
          description: Invalid anime id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAnimeID:
                  value:
                    error:
                      message: ungueltige anime id
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "404":
          description: Watchlist entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: watchlist-eintrag nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Watchlist]
      summary: Remove anime from watchlist
      operationId: deleteWatchlistEntry
      security:
        - bearerAuth: []
      parameters:
        - name: anime_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Watchlist entry deleted
        "400":
          description: Invalid anime id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAnimeID:
                  value:
                    error:
                      message: ungueltige anime id
        "401":
