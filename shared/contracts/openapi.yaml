  /api/v1/assets/{assetId}/stream:
    get:
      tags: [Releases]
      summary: Stream a media asset via Jellyfin proxy
      description: |
        Proxies video stream requests from Jellyfin for authenticated users.
        Requires Portal-Login (session-based authentication).
        Supports range requests for video seeking.
      operationId: streamAsset
      security:
        - BearerAuth: []
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
          description: |
            The Jellyfin item ID (can be numeric or GUID format).
            This ID references a video item in the Jellyfin media library.
      responses:
        "200":
          description: Stream successfully proxied
          headers:
            Content-Type:
              schema:
                type: string
                example: video/mp4
            Accept-Ranges:
              schema:
                type: string
                example: bytes
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/x-matroska:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content (range request)
          headers:
            Content-Range:
              schema:
                type: string
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application\json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Asset not found
          content:
            application\json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error or stream error
          content:
            application\json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
