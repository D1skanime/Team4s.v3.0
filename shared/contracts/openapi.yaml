            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated watchlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWatchlistResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPage:
                  value:
                    error:
                      message: ungueltiger page parameter
                invalidPerPage:
                  value:
                    error:
                      message: ungueltiger per_page parameter
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Watchlist]
      summary: Add anime to watchlist
      operationId: createWatchlistEntry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistCreateRequest"
            examples:
              default:
                value:
                  anime_id: 1
      responses:
        "201":
          description: Created watchlist entry payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistCreateResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
                invalidAnimeID:
                  value:
                    error:
                      message: anime_id ist erforderlich
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "404":
          description: Anime not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: anime nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/watchlist/{anime_id}:
    get:
      tags: [Watchlist]
      summary: Get watchlist entry for anime
      operationId: getWatchlistEntry
      security:
        - bearerAuth: []
      parameters:
        - name: anime_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Watchlist entry payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistCreateResponse"
        "400":
          description: Invalid anime id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAnimeID:
                  value:
                    error:
                      message: ungueltige anime id
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "404":
          description: Watchlist entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: watchlist-eintrag nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Watchlist]
      summary: Remove anime from watchlist
      operationId: deleteWatchlistEntry
      security:
        - bearerAuth: []
      parameters:
        - name: anime_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Watchlist entry deleted
        "400":
          description: Invalid anime id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAnimeID:
                  value:
                    error:
                      message: ungueltige anime id
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "404":
          description: Watchlist entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      message: watchlist-eintrag nicht gefunden
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/anime:
    post:
      tags: [Admin]
      summary: Create anime entry
      operationId: adminCreateAnime
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAnimeCreateRequest"
      responses:
        "201":
          description: Created anime payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnimeUpsertResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "403":
          description: Admin permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    error:
                      message: keine berechtigung
        "503":
          description: Auth state unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authStateUnavailable:
                  value:
                    error:
                      message: auth-status voruebergehend nicht verfuegbar
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/anime/{id}:
    patch:
      tags: [Admin]
      summary: Update anime entry
      operationId: adminUpdateAnime
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAnimePatchRequest"
      responses:
        "200":
          description: Updated anime payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnimeUpsertResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidId:
                  value:
                    error:
                      message: ungueltige anime id
                invalidBody:
                  value:
                    error:
                      message: ungueltiger request body
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      message: anmeldung erforderlich
                invalidToken:
                  value:
                    error:
                      message: ungueltiges zugriffstoken
        "403":
          description: Admin permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    error:
