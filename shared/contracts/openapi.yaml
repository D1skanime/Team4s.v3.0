    UploadOwnProfileAvatarRequest:
      type: object
      description: |
        Preferred Phase 53B contract sends the uncropped `source_file` and the
        cropped display `cropped_file` to the existing avatar endpoint. Legacy
        callers may still submit `file`; the backend stores that same file as
        both source and display. Display reads expose the cropped `original`
        media file as `public_url`; own-profile reads may also expose
        `source_original_url` only as the edit source for re-cropping.
      properties:
        source_file:
          type: string
          format: binary
          description: Internal uncropped source image retained as media_files.variant=source_original.
        cropped_file:
          type: string
          format: binary
          description: Cropped 1:1 display avatar stored as media_files.variant=original and exposed through avatar.public_url.
        file:
          type: string
          format: binary
          description: Backward-compatible single avatar file. Runtime accepts JPG, PNG, and WEBP, enforces the shared 50 MB image limit, and rejects SVG.
