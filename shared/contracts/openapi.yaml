    post:
      tags: [Episodes]
      summary: Issue short-lived stream grant token for episode playback
      operationId: createEpisodePlaybackGrant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "201":
          description: Episode playback grant created
          headers:
            Cache-Control:
              schema:
                type: string
              description: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodePlaybackGrantResponse"
        "400":
          description: Invalid episode id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Episode or stream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Playback grant rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: string
              description: Seconds until grant can be retried.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Grant service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/episodes/{id}/play:
    get:
      tags: [Episodes]
      summary: Stream episode through backend proxy
      operationId: streamEpisodePlayback
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: grant
          in: query
          required: false
          schema:
            type: string
          description: Optional short-lived grant token; required when no bearer token is provided.
      responses:
        "200":
          description: Stream payload
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/x-matroska:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid episode id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required or invalid grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Playback rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: string
              description: Seconds until playback can be retried.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Episode or stream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream stream unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Playback unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SignedToken
  parameters:
    AdminAnimeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            code:
              type: string
              description: Optional machine-readable error code for lane-specific client handling.
            details:
              type: string
              description: Optional operator-facing hint with concrete remediation context.
    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    AuthRevokeRequest:
      type: object
      properties:
        refresh_token:
          type: string
    AuthTokenData:
      type: object
      required:
        - token_type
        - access_token
        - access_token_expires_at
        - access_token_expires_in
        - refresh_token
        - refresh_token_expires_at
        - refresh_token_expires_in
        - user_id
        - display_name
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        access_token_expires_at:
          type: integer
          format: int64
        access_token_expires_in:
          type: integer
          format: int64
        refresh_token:
          type: string
        refresh_token_expires_at:
          type: integer
          format: int64
        refresh_token_expires_in:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        display_name:
          type: string
    AuthTokenResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AuthTokenData"
    AnimeType:
