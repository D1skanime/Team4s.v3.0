  - name: admin-fansub-anime-contributions-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions
    auth:
      required: true
      permission: release.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AnimeContributionListResponse
    notes:
      - Returns contributions enriched with member_display_name from the members table.

  - name: admin-fansub-anime-coverage
    method: GET
    path: /api/v1/admin/fansubs/{id}/anime-coverage
    auth:
      required: true
      permission: release.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: AnimeCoverageListResponse
    notes:
      - Returns one aggregate row per anime_fansub_groups context for the fansub group.
      - has_project_note is true when a non-deleted anime_fansub_project_notes row exists for the anime/group context.

  - name: admin-fansub-anime-project-note-get
    method: GET
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/notes
    auth:
      required: true
      permission: release.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AnimeFansubProjectNoteResponse
    not_found_status: 404
    notes:
      - Read-only release viewers may load the project insight.
      - Creating, updating, and deleting project insights still require note write access.

  - name: admin-fansub-anime-contributions-create
    method: POST
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions
    auth:
      required: true
      permission: fansub_group.members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: UpsertAnimeContributionRequest
    response:
      status: 201
      type: AnimeContributionResponse
    error_responses:
      - status: 404
        description: Fansub group, anime, or historical group member not found.
      - status: 422
        description: Cross-group member mismatch or invalid anime_contribution role_code/status.
    notes:
      - fansub_group_member_id must belong to the fansub group in the route.
      - Repeated POST for the same fansub_group_id/anime_id/fansub_group_member_id/release_version_id uses ON CONFLICT DO UPDATE/upsert semantics instead of creating duplicates.

  - name: admin-fansub-anime-contributions-update
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions/{contributionId}
    auth:
      required: true
      permission: fansub_group.members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
      - name: contributionId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: UpdateAnimeContributionRequest
    response:
      status: 200
      type: AnimeContributionResponse
    error_responses:
      - status: 404
        description: Contribution not found in the addressed fansub/anime context.
      - status: 422
        description: Invalid anime_contribution role_code/status.

  - name: admin-fansub-anime-contributions-delete
    method: DELETE
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions/{contributionId}
    auth:
      required: true
      permission: fansub_group.members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
      - name: contributionId
        type: int64
        minimum: 1
    response:
      status: 204
      type: none
    error_responses:
      - status: 404
        description: Contribution not found in the addressed fansub/anime context.

  - name: admin-member-memorial-set
    method: POST
    path: /api/v1/admin/members/{id}/memorial
    description: >
      Setzt das Profil eines historischen Members auf den Status 'memorial'.
      Nur Global Admin darf diesen Endpoint aufrufen — keine Gruppen-Capability
      ausreichend (D-14/D-16-Caveat). Berührt NICHT den app_user-Account (D-13).
      Alle Setzaktionen werden in audit_logs protokolliert (D-15).
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Nur Global Admin (platform_admin) darf diesen Endpoint aufrufen.
        - Gruppen-Capabilities sind NICHT ausreichend (Fallstrick 4).
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID des Members, dessen Profil als Gedenkprofil markiert werden soll.
    response:
      status: 200
      type: AdminMemberMemorialSetResponse
    error_responses:
      - status: 403
        description: Kein Global Admin — Zugriff verweigert.
      - status: 404
        description: Member nicht gefunden.
      - status: 500
        description: Interner Serverfehler.

  # Phase 78 — Gruppenmedien-Review: GET-Liste
  - name: admin-fansub-group-media-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/media
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - CanForFansubGroup(ActionFansubGroupMediaView) oder ein individuelles Gruppenmedienrecht wird serverseitig geprüft.
        - Gruppenmitgliedschaft allein genügt nicht.
        - Deny-Audit fansub_group_media.list.denied wird geschrieben (D-09).
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID der Fansub-Gruppe.
    response:
      status: 200
      type: FansubGroupMediaListResponse
    error_responses:
      - status: 401
        description: Nicht angemeldet.
      - status: 403
        description: Keine Berechtigung (fansub_group_media.view fehlt).
      - status: 404
        description: Gruppe nicht gefunden.
      - status: 500
        description: Interner Serverfehler.

  # Phase 78 — Gruppenmedien-Review: PATCH Sichtbarkeit/Prüfstatus
  - name: admin-fansub-group-media-patch-review
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/media/{mediaId}
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - CanForFansubGroup(ActionFansubGroupMediaUpdate) wird serverseitig geprüft.
        - Enum-Validierung serverseitig gegen kanonischen value-Satz (V5).
        - Owner-Mismatch (Medium gehört anderer Gruppe) → 403 ohne Mutation (T-78-03).
        - Ändert NIEMALS owner_type/owner_id (D-05).
        - Erfolgs-Audit fansub_group_media.visibility_updated + Deny-Audit (D-09).
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID der Fansub-Gruppe.
      - name: mediaId
        type: int64
        minimum: 1
        description: ID des Medienassets.
    request_body:
      required: true
      description: >
        Mindestens eines der Felder muss angegeben werden.
        Kanonische Enum-Werte: visibility in {intern, oeffentlich};
        review_status in {in_pruefung, freigegeben, abgelehnt, archiviert, entfernt}.
        Metadatenfelder: title, description, alt_text, category, sort_order.
      example:
        visibility: "oeffentlich"
        review_status: "freigegeben"
        title: "Connichi-Stand 2008"
        category: "event_meeting"
    response:
      status: 200
      example:
        message: "Medien-Review wurde aktualisiert."
    error_responses:
      - status: 400
        description: Ungültiger Enum-Wert für visibility oder review_status — keine Mutation.
      - status: 401
        description: Nicht angemeldet.
      - status: 403
        description: Keine Berechtigung oder Medium gehört anderer Gruppe (Owner-Mismatch).
      - status: 404
        description: Medium oder Gruppe nicht gefunden.
      - status: 500
        description: Interner Serverfehler.

  # Phase 90d — Gruppenmedien-Reihenfolge
  - name: admin-fansub-group-media-reorder
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/media/reorder
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - CanForFansubGroup(ActionFansubGroupMediaUpdate) oder individuelles can_reorder wird serverseitig geprüft.
        - Frontend sendet nur Medien-IDs in Zielreihenfolge, keine sort_order-Werte.
        - Backend validiert, dass alle IDs aktive Gruppenmedien der angegebenen Gruppe sind.
        - Backend normalisiert sort_order in konsistenten 1000er-Schritten.
        - Erfolgs-Audit fansub_group_media.reordered + Deny-Audit.
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID der Fansub-Gruppe.
    request_body:
      required: true
      type: FansubGroupMediaReorderRequest
      example:
        mediaIds: [123, 124, 125]
    response:
      status: 200
      example:
        status: "ok"
    error_responses:
      - status: 400
        description: mediaIds fehlt, ist leer, enthält ungültige oder doppelte IDs.
      - status: 401
        description: Nicht angemeldet.
      - status: 403
        description: Keine Berechtigung.
      - status: 404
        description: Eine oder mehrere Medien gehören nicht zu dieser Gruppe.
      - status: 500
        description: Interner Serverfehler.

  - name: admin-release-version-contributions-effective
    method: GET
    path: /api/v1/admin/release-versions/:versionId/contributions/effective
    auth:
      required: true
      permission: release_version.view für die adressierte Release-Version
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: versionId
        type: int64
        minimum: 1
    query_params:
      - name: fansub_group_id
        type: int64
        required: true
        minimum: 1
    response:
      status: 200
      type: EffectiveContributionsResponse
    notes:
      - Liefert den aufgelösten Mitwirkenden-Satz (Override oder Projekt-Default, D-02).
      - meta.is_override=true wenn versions-spezifische Contributions existieren.
      - meta.source entweder "release_version" oder "anime_default".
      - contribution_id ist in jedem Row enthalten, damit das Frontend beim Speichern exakt die richtigen IDs löscht (Pitfall 4).
      - IDOR-Mitigation (T-83-IDOR) CanForReleaseVersion(ActionReleaseVersionView) wird vor Datenrückgabe geprüft.

