feature: admin-content-management
endpoints:
  - name: admin-anime-create
    method: POST
    path: /api/v1/admin/anime
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    request_body:
      required: true
      type: AdminAnimeCreateRequest
      example:
        title: "Attack on Titan"
        title_de: "Angriff der Titanen"
        title_en: "Attack on Titan"
        type: "tv"
        content_type: "anime"
        status: "ongoing"
        year: 2013
        max_episodes: 25
        genre: "Action, Drama"
        description: "Menschen kaempfen gegen Titanen."
        cover_image: "attack-on-titan.jpg"
    response:
      status: 201
      type: AdminAnimeUpsertResponse

  - name: admin-anime-update
    method: PATCH
    path: /api/v1/admin/anime/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: AdminAnimePatchRequest
      example:
        status: "done"
        max_episodes: 25
        description: "Abgeschlossen."
    response:
      status: 200
      type: AdminAnimeUpsertResponse

  - name: admin-episode-create
    method: POST
    path: /api/v1/admin/episodes
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    request_body:
      required: true
      type: AdminEpisodeCreateRequest
      example:
        anime_id: 1
        episode_number: "01"
        title: "An dich in 2000 Jahren"
        status: "public"
        stream_link: "https://anime.team4s.de/web/index.html#!/item?id=6424&serverId=8bc8ae6fe2d946fcbd21cb341832072d&context=tvshows"
    response:
      status: 201
      type: AdminEpisodeUpsertResponse

  - name: admin-anime-jellyfin-sync
    method: POST
    path: /api/v1/admin/anime/:id/jellyfin/sync
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: false
      type: AdminAnimeJellyfinSyncRequest
      example:
        jellyfin_series_id: "2dd78be87c3740a781eb479cca260361"
        season_number: 1
        episode_status: "private"
        overwrite_episode_titles: false
        overwrite_version_titles: false
        cleanup_provider_versions: false
        allow_mismatch: false
    response:
      status: 200
      type: AdminAnimeJellyfinSyncResponse

  - name: admin-jellyfin-series-search
    method: GET
    path: /api/v1/admin/jellyfin/series
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    query_params:
      - name: q
        type: string
        required: true
        description: "Series title query."
      - name: limit
        type: integer
        default: 25
        maximum: 100
    response:
      status: 200
      type: AdminJellyfinSeriesSearchResponse

  - name: admin-anime-jellyfin-preview
    method: POST
    path: /api/v1/admin/anime/:id/jellyfin/preview
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: false
      type: AdminAnimeJellyfinSyncRequest
      example:
        jellyfin_series_id: "2dd78be87c3740a781eb479cca260361"
        season_number: 1
        episode_status: "private"
        overwrite_episode_titles: false
        overwrite_version_titles: false
        allow_mismatch: false
    response:
      status: 200
      type: AdminAnimeJellyfinPreviewResponse

  - name: admin-episode-update
    method: PATCH
    path: /api/v1/admin/episodes/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: AdminEpisodePatchRequest
      example:
        title: "An dich in 2000 Jahren (Remastered)"
        status: "public"
        stream_link: "https://anime.team4s.de/web/index.html#!/item?id=6424&serverId=8bc8ae6fe2d946fcbd21cb341832072d&context=tvshows"
    response:
      status: 200
      type: AdminEpisodeUpsertResponse

  - name: admin-episode-delete
    method: DELETE
    path: /api/v1/admin/episodes/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminEpisodeDeleteResponse

  - name: admin-genre-tokens
    method: GET
    path: /api/v1/admin/genres
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    query_params:
      - name: q
        type: string
        description: "Optional substring filter."
      - name: limit
        type: integer
        default: 200
        maximum: 1000
    response:
      status: 200
      type: AdminGenreTokensResponse

  - name: admin-fansub-anime-releases
    method: GET
    path: /api/v1/admin/fansubs/:id/anime/:animeId/releases
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminFansubAnimeReleasesResponse

  - name: admin-fansub-anime-release-canonical
    method: GET
    path: /api/v1/admin/fansubs/:id/anime/:animeId/releases/canonical
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminCanonicalFansubAnimeReleaseResponse

  - name: admin-release-get
    method: GET
    path: /api/v1/admin/releases/:releaseId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: releaseId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminReleaseResponse

  - name: admin-release-version-media-list
    method: GET
    path: /api/v1/admin/release-versions/:versionId/media
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
    response:
      status: 200
      type: ReleaseVersionMediaListResponse

  - name: admin-release-version-media-upload
    method: POST
    path: /api/v1/admin/release-versions/:versionId/media
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
    request_body:
      required: true
      content_type: multipart/form-data
      fields:
        category: "ReleaseVersionMediaCategory (required)"
        caption: "string | null"
        is_preview_candidate: boolean
        files[]: "binary[] (required, max: 20)"
    response:
      status: 200
      type: ReleaseVersionMediaUploadResponse

  - name: admin-release-version-media-patch
    method: PATCH
    path: /api/v1/admin/release-versions/:versionId/media/:relationId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
      - name: relationId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: ReleaseVersionMediaPatchRequest
    response:
      status: 200
      type: ReleaseVersionMediaItem

  - name: admin-release-version-media-delete
    method: DELETE
    path: /api/v1/admin/release-versions/:versionId/media/:relationId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
      - name: relationId
        type: int64
        minimum: 1
    response:
      status: 200
      type: StatusResponse

types:
  AdminFansubReleaseSummary:
    release_id: int64
    release_version_id: "int64 (description: Kanonische Release-Version-ID fuer release_version_media; release_id ist hierfuer nicht gueltig)"
    anime_id: int64
    anime_title: string
    fansub_group_id: int64
    fansub_name: string
    episode_id: int64
    episode_number: string
    episode_title: string | null
    source: string | null
    version_count: int32
    has_theme_assets: boolean
    duration_seconds: int32 | null
    created_at: timestamp
  AdminFansubAnimeReleasesResponse:
    data: AdminFansubReleaseSummary[]
  AdminCanonicalFansubAnimeReleaseResponse:
    fansub_group_id: int64
    anime_id: int64
    release: AdminFansubReleaseSummary | null
  AdminReleaseResponse:
    data: AdminFansubReleaseSummary
  ReleaseVersionMediaCategory:
    enum: screenshot | typesetting_karaoke | fun_outtake | other
  ReleaseVersionMediaItem:
    id: int64
    release_version_id: int64
    media_asset_id: int64
    category: ReleaseVersionMediaCategory
    caption: string | null
    sort_order: int32
    is_preview_candidate: boolean
    uploaded_by_user_id: int64 | null
    created_at: timestamp
    updated_at: timestamp | null
    thumbnail_url: string | null
    original_url: string | null
  ReleaseVersionMediaListResponse:
    data: ReleaseVersionMediaItem[]
  ReleaseVersionMediaUploadResponse:
    results: ReleaseVersionMediaUploadResult[]
  ReleaseVersionMediaUploadResult:
    client_file_name: string
    status: ready | failed
    media_asset_id: int64 (optional)
    release_version_media_id: int64 (optional)
    thumbnail_url: string (optional)
    error_code: string (optional)
    message: string (optional)
  ReleaseVersionMediaPatchRequest:
    caption: string | null
    is_preview_candidate: boolean (optional)
  StatusResponse:
    status: string
  AdminAnimeCreateRequest:
    title: string (required, min: 1, max: 255)
    title_de: string | null
    title_en: string | null
    type: anime_type (required)
    content_type: content_type (required)
    status: anime_status (required)
    year: int16 | null
    max_episodes: int16 | null
    genre: string | null
    description: string | null
    cover_image: string | null
  AdminAnimePatchRequest:
    title: string (optional, min: 1, max: 255)
    title_de: string | null
    title_en: string | null
    type: anime_type (optional)
    content_type: content_type (optional)
    status: anime_status (optional)
    year: int16 | null
    max_episodes: int16 | null
    genre: string | null
    description: string | null
    cover_image: string | null
  AdminEpisodeCreateRequest:
    anime_id: int64 (required, minimum: 1)
    episode_number: string (required, min: 1, max: 32)
    title: string | null
    status: episode_status (required)
    stream_link: string | null
  AdminEpisodePatchRequest:
    episode_number: string (optional, min: 1, max: 32)
    title: string | null
    status: episode_status (optional)
    stream_link: string | null
  AdminAnimeJellyfinSyncRequest:
    jellyfin_series_id: string (optional, max: 120)
    season_number: int32 (optional, minimum: 1, default: 1)
    episode_status: episode_status (optional, default: private)
    overwrite_episode_titles: boolean (optional, default: false)
    overwrite_version_titles: boolean (optional, default: false)
    cleanup_provider_versions: boolean (optional, default: false, description: "Wenn true, werden alle bestehenden Jellyfin-Versionen fuer diesen Anime vor dem Import geloescht")
    allow_mismatch: boolean (optional, default: false, description: "Wenn true, wird der max_episodes-Mismatch-Guard fuer den aktuellen Sync ueberschrieben")
  AdminAnimeUpsertResponse:
    data: AdminAnimeItem
  AdminEpisodeUpsertResponse:
    data: AdminEpisodeItem
  AdminEpisodeDeleteResponse:
    data: AdminEpisodeDeleteResult
  AdminEpisodeDeleteResult:
    episode_id: int64
    anime_id: int64
    episode_number: string
    deleted_release_variants: int32
  AdminAnimeJellyfinSyncResponse:
    data: AdminAnimeJellyfinSyncResult
  AdminJellyfinSeriesSearchResponse:
    data: AdminJellyfinSeriesSearchItem[]
  AdminJellyfinSeriesSearchItem:
    jellyfin_series_id: string
    name: string
    production_year: int32 | null
    path: string | null
  AdminAnimeJellyfinPreviewResponse:
    data: AdminAnimeJellyfinPreviewResult
  AdminAnimeJellyfinPreviewResult:
    anime_id: int64
    jellyfin_series_id: string
    jellyfin_series_name: string
    jellyfin_series_path: string | null
    applied_path_prefix: string | null
    season_number: int32
    scanned_episodes: int32
    matched_episodes: int32
    path_filtered_episodes: int32
    accepted_unique_episodes: int32
    mismatch_detected: boolean
    mismatch_reason: string | null
    skipped_episodes: int32
    existing_jellyfin_versions: int32 (description: "Anzahl der bestehenden Jellyfin-Versionen die bei cleanup_provider_versions=true geloescht wuerden")
    existing_episodes: int32
    applied_episode_status: episode_status
    overwrite_episode_titles: boolean
    overwrite_version_titles: boolean
    episodes: AdminAnimeJellyfinPreviewEpisode[]
  AdminAnimeJellyfinPreviewEpisode:
    jellyfin_item_id: string
    episode_number: int32
    title: string | null
    premiere_date: timestamp | null
    video_quality: string | null
  AdminAnimeJellyfinSyncResult:
    anime_id: int64
    jellyfin_series_id: string
    jellyfin_series_name: string
    jellyfin_series_path: string | null
    applied_path_prefix: string | null
    season_number: int32
    scanned_episodes: int32
    path_filtered_episodes: int32
    accepted_unique_episodes: int32
    imported_episodes: int32
    updated_episodes: int32
    imported_versions: int32
    updated_versions: int32
    skipped_episodes: int32
    deleted_versions: int32 (optional, description: "Anzahl der geloeschten Jellyfin-Versionen (nur wenn cleanup_provider_versions=true)")
    applied_episode_status: episode_status
    overwrite_episode_titles: boolean
    overwrite_version_titles: boolean
  AdminGenreTokensResponse:
    data: GenreToken[]
  GenreToken:
    name: string
    count: int64
  AdminAnimeItem:
    id: int64
    title: string
    title_de: string | null
    title_en: string | null
    type: anime_type
    content_type: content_type
    status: anime_status
    year: int16 | null
    max_episodes: int16 | null
    genre: string | null
    description: string | null
    cover_image: string | null
  AdminEpisodeItem:
    id: int64
    anime_id: int64
    episode_number: string
    title: string | null
    status: episode_status
    stream_link: string | null
