  # Phase 78 — Gruppenmedien-Review (Lock K, D-05/D-06/D-08/D-09)
  FansubGroupMediaItem:
    description: >
      Ein Medieneintrag einer Fansub-Gruppe mit Sichtbarkeit, Prüfstatus und Owner-Konsistenz-Flag.
      Sichtbarkeit und Prüfstatus werden als kanonische API-Wert-Strings zurückgegeben
      (visibility: intern | oeffentlich; review_status: in_pruefung | freigegeben | abgelehnt | archiviert | entfernt).
      owner_consistent zeigt NUR an, ob das Medium korrekt zur Gruppe gehört — kein Setter (D-05).
    id: int64
    preview_url: string | null (description: "Öffentliche URL des Medienassets")
    visibility: string | null (enum intern|oeffentlich, description: "Sichtbarkeitsachse; null wenn nicht gesetzt")
    review_status: string | null (enum in_pruefung|freigegeben|abgelehnt|archiviert|entfernt, description: "Prüfstatusachse; null wenn nicht gesetzt")
    owner_type: string (description: "Typ der Owner-Tabelle, immer 'fansub_group'")
    owner_id: int64 (description: "ID der besitzenden Fansub-Gruppe")
    owner_consistent: boolean (description: "true wenn Medium korrekt zur angefragten Gruppe gehört — nur lesend, kein Setter (D-05/Phase 79)")

  FansubGroupMediaListResponse:
    description: Liste aller Gruppenmedien für den Review-Tab. Scoped auf die angeforderte Gruppe (D-04).
    data: FansubGroupMediaItem[]
