feature: admin-content-management
endpoints:
  - name: admin-anime-create
    method: POST
    path: /api/v1/admin/anime
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    request_body:
      required: true
      type: AdminAnimeCreateRequest
      example:
        title: "Attack on Titan"
        title_de: "Angriff der Titanen"
        title_en: "Attack on Titan"
        type: "tv"
        content_type: "anime"
        status: "ongoing"
        year: 2013
        max_episodes: 25
        genre: "Action, Drama"
        description: "Menschen kaempfen gegen Titanen."
        cover_image: "attack-on-titan.jpg"
    response:
      status: 201
      type: AdminAnimeUpsertResponse

  - name: admin-anime-update
    method: PATCH
    path: /api/v1/admin/anime/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: AdminAnimePatchRequest
      example:
        status: "done"
        max_episodes: 25
        description: "Abgeschlossen."
    response:
      status: 200
      type: AdminAnimeUpsertResponse

  - name: admin-episode-create
    method: POST
    path: /api/v1/admin/episodes
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    request_body:
      required: true
      type: AdminEpisodeCreateRequest
      example:
        anime_id: 1
        episode_number: "01"
        title: "An dich in 2000 Jahren"
        status: "public"
        stream_link: "https://anime.team4s.de/web/index.html#!/item?id=6424&serverId=8bc8ae6fe2d946fcbd21cb341832072d&context=tvshows"
    response:
      status: 201
      type: AdminEpisodeUpsertResponse

  - name: admin-anime-jellyfin-sync
    method: POST
    path: /api/v1/admin/anime/:id/jellyfin/sync
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: false
      type: AdminAnimeJellyfinSyncRequest
      example:
        jellyfin_series_id: "2dd78be87c3740a781eb479cca260361"
        season_number: 1
        episode_status: "private"
        overwrite_episode_titles: false
        overwrite_version_titles: false
        cleanup_provider_versions: false
        allow_mismatch: false
    response:
      status: 200
      type: AdminAnimeJellyfinSyncResponse

  - name: admin-jellyfin-series-search
    method: GET
    path: /api/v1/admin/jellyfin/series
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    query_params:
      - name: q
        type: string
        required: true
        description: "Series title query."
      - name: limit
        type: integer
        default: 25
        maximum: 100
    response:
      status: 200
      type: AdminJellyfinSeriesSearchResponse

  - name: admin-anime-jellyfin-preview
    method: POST
    path: /api/v1/admin/anime/:id/jellyfin/preview
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: false
      type: AdminAnimeJellyfinSyncRequest
      example:
        jellyfin_series_id: "2dd78be87c3740a781eb479cca260361"
        season_number: 1
        episode_status: "private"
        overwrite_episode_titles: false
        overwrite_version_titles: false
        allow_mismatch: false
    response:
      status: 200
      type: AdminAnimeJellyfinPreviewResponse

  - name: admin-episode-update
    method: PATCH
    path: /api/v1/admin/episodes/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: AdminEpisodePatchRequest
      example:
        title: "An dich in 2000 Jahren (Remastered)"
        status: "public"
        stream_link: "https://anime.team4s.de/web/index.html#!/item?id=6424&serverId=8bc8ae6fe2d946fcbd21cb341832072d&context=tvshows"
    response:
      status: 200
      type: AdminEpisodeUpsertResponse

  - name: admin-episode-delete
    method: DELETE
    path: /api/v1/admin/episodes/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminEpisodeDeleteResponse

  - name: admin-genre-tokens
    method: GET
    path: /api/v1/admin/genres
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Admin role/permission enforcement is required before production enablement.
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
      state_unavailable_status: 503
      state_unavailable_response:
        error:
          message: "auth-status voruebergehend nicht verfuegbar"
    query_params:
      - name: q
        type: string
        description: "Optional substring filter."
      - name: limit
        type: integer
        default: 200
        maximum: 1000
    response:
      status: 200
      type: AdminGenreTokensResponse

  - name: admin-fansub-anime-releases
    method: GET
    path: /api/v1/admin/fansubs/:id/anime/:animeId/releases
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    query_params:
      - name: page
        type: int32
        default: 1
        minimum: 1
      - name: per_page
        type: int32
        default: 30
        minimum: 1
        maximum: 100
    response:
      status: 200
      type: AdminFansubAnimeReleasesResponse

  - name: admin-fansub-anime-release-canonical
    method: GET
    path: /api/v1/admin/fansubs/:id/anime/:animeId/releases/canonical
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminCanonicalFansubAnimeReleaseResponse

  - name: admin-release-get
    method: GET
    path: /api/v1/admin/releases/:releaseId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: releaseId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AdminReleaseResponse

  - name: admin-release-version-media-list
    method: GET
    path: /api/v1/admin/release-versions/:versionId/media
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
    response:
      status: 200
      type: ReleaseVersionMediaListResponse

  - name: admin-release-version-media-upload
    method: POST
    path: /api/v1/admin/release-versions/:versionId/media
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
    request_body:
      required: true
      content_type: multipart/form-data
      fields:
        category: "ReleaseVersionMediaCategory (required)"
        caption: "string | null"
        is_preview_candidate: boolean
        files[]: "binary[] (required, max: 20)"
    response:
      status: 200
      type: ReleaseVersionMediaUploadResponse

  - name: admin-release-version-media-patch
    method: PATCH
    path: /api/v1/admin/release-versions/:versionId/media/:relationId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
      - name: relationId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: ReleaseVersionMediaPatchRequest
    response:
      status: 200
      type: ReleaseVersionMediaItem

  - name: admin-release-version-media-delete
    method: DELETE
    path: /api/v1/admin/release-versions/:versionId/media/:relationId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
    path_params:
      - name: versionId
        type: int64
        minimum: 1
      - name: relationId
        type: int64
        minimum: 1
    response:
      status: 200
      type: StatusResponse

  - name: admin-fansub-anime-contributions-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions
    auth:
      required: true
      permission: fansub_group.members.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    response:
      status: 200
      type: AnimeContributionListResponse
    notes:
      - Returns contributions enriched with member_display_name from the members table.

  - name: admin-fansub-anime-coverage
    method: GET
    path: /api/v1/admin/fansubs/{id}/anime-coverage
    auth:
      required: true
      permission: fansub_group.members.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: AnimeCoverageListResponse
    notes:
      - Returns one aggregate row per anime_fansub_groups context for the fansub group.
      - has_project_note is true when a non-deleted anime_fansub_project_notes row exists for the anime/group context.

  - name: admin-fansub-anime-contributions-create
    method: POST
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions
    auth:
      required: true
      permission: fansub_group.members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: UpsertAnimeContributionRequest
    response:
      status: 201
      type: AnimeContributionResponse
    error_responses:
      - status: 404
        description: Fansub group, anime, or historical group member not found.
      - status: 422
        description: Cross-group member mismatch or invalid anime_contribution role_code/status.
    notes:
      - fansub_group_member_id must belong to the fansub group in the route.
      - Repeated POST for the same fansub_group_id/anime_id/fansub_group_member_id/release_version_id uses ON CONFLICT DO UPDATE/upsert semantics instead of creating duplicates.

  - name: admin-fansub-anime-contributions-update
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions/{contributionId}
    auth:
      required: true
      permission: fansub_group.members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
      - name: contributionId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: UpdateAnimeContributionRequest
    response:
      status: 200
      type: AnimeContributionResponse
    error_responses:
      - status: 404
        description: Contribution not found in the addressed fansub/anime context.
      - status: 422
        description: Invalid anime_contribution role_code/status.

  - name: admin-fansub-anime-contributions-delete
    method: DELETE
    path: /api/v1/admin/fansubs/{id}/anime/{animeId}/contributions/{contributionId}
    auth:
      required: true
      permission: fansub_group.members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: animeId
        type: int64
        minimum: 1
      - name: contributionId
        type: int64
        minimum: 1
    response:
      status: 204
      type: none
    error_responses:
      - status: 404
        description: Contribution not found in the addressed fansub/anime context.

  - name: admin-member-memorial-set
    method: POST
    path: /api/v1/admin/members/{id}/memorial
    description: >
      Setzt das Profil eines historischen Members auf den Status 'memorial'.
      Nur Global Admin darf diesen Endpoint aufrufen — keine Gruppen-Capability
      ausreichend (D-14/D-16-Caveat). Berührt NICHT den app_user-Account (D-13).
      Alle Setzaktionen werden in audit_logs protokolliert (D-15).
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - Nur Global Admin (platform_admin) darf diesen Endpoint aufrufen.
        - Gruppen-Capabilities sind NICHT ausreichend (Fallstrick 4).
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID des Members, dessen Profil als Gedenkprofil markiert werden soll.
    response:
      status: 200
      type: AdminMemberMemorialSetResponse
    error_responses:
      - status: 403
        description: Kein Global Admin — Zugriff verweigert.
      - status: 404
        description: Member nicht gefunden.
      - status: 500
        description: Interner Serverfehler.

  # Phase 78 — Gruppenmedien-Review: GET-Liste
  - name: admin-fansub-group-media-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/media
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - CanForFansubGroup(ActionFansubGroupEdit) wird serverseitig geprüft (D-08).
        - Gruppenmitgliedschaft allein genügt nicht.
        - Deny-Audit fansub_group_media.list.denied wird geschrieben (D-09).
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID der Fansub-Gruppe.
    response:
      status: 200
      type: FansubGroupMediaListResponse
    error_responses:
      - status: 401
        description: Nicht angemeldet.
      - status: 403
        description: Keine Berechtigung (ActionFansubGroupEdit fehlt).
      - status: 404
        description: Gruppe nicht gefunden.
      - status: 500
        description: Interner Serverfehler.

  # Phase 78 — Gruppenmedien-Review: PATCH Sichtbarkeit/Prüfstatus
  - name: admin-fansub-group-media-patch-review
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/media/{mediaId}
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      notes:
        - CanForFansubGroup(ActionFansubGroupEdit) wird serverseitig geprüft (D-08).
        - Enum-Validierung serverseitig gegen kanonischen value-Satz (V5).
        - Owner-Mismatch (Medium gehört anderer Gruppe) → 403 ohne Mutation (T-78-03).
        - Ändert NIEMALS owner_type/owner_id (D-05).
        - Erfolgs-Audit fansub_group_media.visibility_updated + Deny-Audit (D-09).
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
        description: ID der Fansub-Gruppe.
      - name: mediaId
        type: int64
        minimum: 1
        description: ID des Medienassets.
    request_body:
      required: true
      description: >
        Mindestens eines der Felder muss angegeben werden.
        Kanonische Enum-Werte: visibility in {intern, oeffentlich};
        review_status in {in_pruefung, freigegeben, abgelehnt, archiviert, entfernt}.
      example:
        visibility: "oeffentlich"
        review_status: "freigegeben"
    response:
      status: 200
      example:
        message: "Medien-Review wurde aktualisiert."
    error_responses:
      - status: 400
        description: Ungültiger Enum-Wert für visibility oder review_status — keine Mutation.
      - status: 401
        description: Nicht angemeldet.
      - status: 403
        description: Keine Berechtigung oder Medium gehört anderer Gruppe (Owner-Mismatch).
      - status: 404
        description: Medium oder Gruppe nicht gefunden.
      - status: 500
        description: Interner Serverfehler.

  - name: admin-release-version-contributions-effective
    method: GET
    path: /api/v1/admin/release-versions/:versionId/contributions/effective
    auth:
      required: true
      permission: release_version.view für die adressierte Release-Version
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: versionId
        type: int64
        minimum: 1
    query_params:
      - name: fansub_group_id
        type: int64
        required: true
        minimum: 1
    response:
      status: 200
      type: EffectiveContributionsResponse
    notes:
      - Liefert den aufgelösten Mitwirkenden-Satz (Override oder Projekt-Default, D-02).
      - meta.is_override=true wenn versions-spezifische Contributions existieren.
      - meta.source entweder "release_version" oder "anime_default".
      - contribution_id ist in jedem Row enthalten, damit das Frontend beim Speichern exakt die richtigen IDs löscht (Pitfall 4).
      - IDOR-Mitigation (T-83-IDOR) CanForReleaseVersion(ActionReleaseVersionView) wird vor Datenrückgabe geprüft.

types:
  PaginationMeta:
    total: int64
    page: int32
    per_page: int32
    total_pages: int32
  AdminFansubReleaseSummary:
    release_id: int64
    release_version_id: "int64 (description: Kanonische Release-Version-ID fuer release_version_media; release_id ist hierfuer nicht gueltig)"
    anime_id: int64
    anime_title: string
    fansub_group_id: int64
    fansub_name: string
    episode_id: int64
    episode_number: string
    episode_title: string | null
    source: string | null
    version_count: int32
    has_theme_assets: boolean
    has_override: "boolean (description: EXISTS-Subquery über release_versions JOIN anime_contributions auf Release-Ebene (fr.id), D-08. True wenn mindestens eine versions-spezifische Contribution für diesen Release existiert.)"
    duration_seconds: int32 | null
    created_at: timestamp
  AdminFansubAnimeReleasesResponse:
    data: AdminFansubReleaseSummary[]
    meta: PaginationMeta
  AdminCanonicalFansubAnimeReleaseResponse:
    fansub_group_id: int64
    anime_id: int64
    release: AdminFansubReleaseSummary | null
  AdminReleaseResponse:
    data: AdminFansubReleaseSummary
  EffectiveContributionRow:
    contribution_id: "int64 (description: Pflicht für sicheres Frontend-Delete, Pitfall 4)"
    member_id: int64
    member_display_name: string
    member_avatar_url: string | null
    role_codes: string[]
  EffectiveContributionsMeta:
    is_override: "boolean (description: true wenn versions-spezifische Contributions existieren, D-02)"
    source: "string (description: 'release_version' oder 'anime_default', D-02)"
  EffectiveContributionsResponse:
    data: EffectiveContributionRow[]
    meta: EffectiveContributionsMeta
  ReleaseVersionMediaCategory:
    enum: screenshot | typesetting_karaoke | fun_outtake | other
  ReleaseVersionMediaItem:
    id: int64
    release_version_id: int64
    media_asset_id: int64
    category: ReleaseVersionMediaCategory
    caption: string | null
    sort_order: int32
    is_preview_candidate: boolean
    uploaded_by_user_id: int64 | null
    created_at: timestamp
    updated_at: timestamp | null
    thumbnail_url: string | null
    original_url: string | null
