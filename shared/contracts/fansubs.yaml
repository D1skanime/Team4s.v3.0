feature: fansub-management
endpoints:
  - name: fansub-list
    method: GET
    path: /api/v1/fansubs
    query_params:
      - name: q
        type: string
        description: Optional substring filter on name and slug.
      - name: status
        type: string
        enum: [active, inactive, dissolved]
      - name: page
        type: int32
        default: 1
      - name: per_page
        type: int32
        default: 24
        maximum: 500
    response:
      status: 200
      type: FansubGroupListResponse

  - name: fansub-create
    method: POST
    path: /api/v1/fansubs
    auth:
      required: true
      permission: fansub_group.edit for the addressed fansub group; slug changes require platform_admin
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    request_body:
      required: true
      type: FansubGroupCreateRequest
    response:
      status: 201
      type: FansubGroupResponse

  - name: fansub-get-by-id
    method: GET
    path: /api/v1/fansubs/:id
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubGroupResponse

  - name: fansub-get-by-slug
    method: GET
    path: /api/v1/fansub-slugs/:slug
    path_params:
      - name: slug
        type: string
        minimum_length: 1
        maximum_length: 120
    response:
      status: 200
      type: FansubGroupResponse

  - name: fansub-update
    method: PATCH
    path: /api/v1/fansubs/:id
    auth:
      required: true
      permission: fansub_group.edit for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: FansubGroupPatchRequest
    response:
      status: 200
      type: FansubGroupResponse

  - name: fansub-delete
    method: DELETE
    path: /api/v1/fansubs/:id
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 204
      type: none

  - name: fansub-members-list
    method: GET
    path: /api/v1/fansubs/:id/members
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubMemberListResponse

  - name: fansub-aliases-list
    method: GET
    path: /api/v1/fansubs/:id/aliases
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubAliasListResponse

  - name: fansub-aliases-create
    method: POST
    path: /api/v1/fansubs/:id/aliases
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: FansubAliasCreateRequest
    response:
      status: 201
      type: FansubAliasResponse

  - name: fansub-aliases-delete
    method: DELETE
    path: /api/v1/fansubs/:id/aliases/:aliasId
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: aliasId
        type: int64
        minimum: 1
    response:
      status: 204
      type: none

  - name: fansub-merge-preview
    method: POST
    path: /api/v1/admin/fansubs/merge/preview
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    request_body:
      required: true
      type: MergeFansubsRequest
    response:
      status: 200
      type: MergeFansubsPreviewResponse

  - name: fansub-merge
    method: POST
    path: /api/v1/admin/fansubs/merge
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    request_body:
      required: true
      type: MergeFansubsRequest
    response:
      status: 200
      type: MergeFansubsResponse

  - name: fansub-media-upload
    method: POST
