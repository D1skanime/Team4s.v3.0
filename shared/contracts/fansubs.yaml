  - name: fansub-media-delete
    method: DELETE
    path: /api/v1/admin/fansubs/:id/media/:kind
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      unauthenticated_response:
        error:
          message: "anmeldung erforderlich"
      forbidden_status: 403
      forbidden_response:
        error:
          message: "keine berechtigung"
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: kind
        type: FansubMediaKind
    response:
