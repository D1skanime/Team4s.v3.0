types:
  FansubStatus:
    enum: [active, inactive, dissolved]
  FansubGroupType:
    enum: [group]
  FansubGroupListResponse:
    data: FansubGroup[]
    meta: PaginationMeta
  FansubGroupResponse:
    data: FansubGroup
  FansubMemberListResponse:
    data: FansubMember[]
  FansubMemberResponse:
    data: FansubMember
  FansubAliasListResponse:
    data: FansubAlias[]
  FansubAliasResponse:
    data: FansubAlias
  AnimeFansubListResponse:
    data: AnimeFansub[]
  AnimeFansubResponse:
    data: AnimeFansub
  MergeFansubsResponse:
    data: MergeFansubsResult
  MergeFansubsPreviewResponse:
    data: MergeFansubsPreviewResult
  FansubGroupCreateRequest:
    slug: string (required, min: 1, max: 120)
    name: string (required, min: 1, max: 120)
    logo_id: int64 | null
    banner_id: int64 | null
    logo_url: string | null
    banner_url: string | null
    founded_year: int32 | null
    dissolved_year: int32 | null
    status: FansubStatus (required)
    group_type: FansubGroupType (optional, default: group)
    website_url: string | null
    discord_url: string | null
    irc_url: string | null
    country: string | null
  FansubGroupPatchRequest:
    slug: string (optional, min: 1, max: 120, platform_admin only)
    name: string (optional, min: 1, max: 120)
    logo_id: int64 | null
    banner_id: int64 | null
    logo_url: string | null
    banner_url: string | null
    founded_year: int32 | null
    dissolved_year: int32 | null
    status: FansubStatus (optional)
    group_type: FansubGroupType (optional)
    website_url: string | null
    discord_url: string | null
    irc_url: string | null
    country: string | null
  FansubMemberCreateRequest:
    handle: string (required, min: 1, max: 120)
    role: string (required, min: 1, max: 60)
    since_year: int32 | null
    until_year: int32 | null
    notes: string | null
  FansubMemberPatchRequest:
    handle: string (optional, min: 1, max: 120)
    role: string (optional, min: 1, max: 60)
    since_year: int32 | null
    until_year: int32 | null
    notes: string | null
  FansubAliasCreateRequest:
    alias: string (required, min: 1, max: 120)
  AnimeFansubAttachRequest:
    is_primary: bool
    notes: string | null
  MergeFansubsRequest:
    target_id: int64 (required, minimum: 1)
    source_ids: int64[] (required, min_items: 1)
  MergeFansubsResult:
    merged_count: int32
    versions_migrated: int32
    members_migrated: int32
    relations_migrated: int32
    aliases_added: string[]
  MergeFansubsPreviewResult:
    merged_count: int32
    versions_migrated: int32
    members_migrated: int32
    relations_migrated: int32
    aliases_added: string[]
    aliases_skipped: string[]
    can_merge: bool
    conflicts: MergeFansubsPreviewConflicts
  MergeFansubsPreviewConflicts:
    version_conflicts: int32
    duplicate_aliases_count: int32
    duplicate_aliases: string[]
    duplicate_members_count: int32
    duplicate_members: string[]
    duplicate_relations_count: int32
    duplicate_relation_anime_ids: int64[]
    duplicate_slugs_count: int32
    duplicate_slugs: string[]
    duplicate_names_count: int32
    duplicate_names: string[]
  FansubGroup:
    id: int64
    slug: string
    name: string
    logo_id: int64 | null
    banner_id: int64 | null
    logo_url: string | null
    banner_url: string | null
    founded_year: int32 | null
    dissolved_year: int32 | null
    status: FansubStatus
    group_type: FansubGroupType
    website_url: string | null
    discord_url: string | null
    irc_url: string | null
    country: string | null
    anime_relations_count: int32
    release_versions_count: int32
    members_count: int32
    aliases_count: int32
    created_at: datetime
    updated_at: datetime
  FansubGroupSummary:
    id: int64
    slug: string
    name: string
    logo_url: string | null
  FansubMember:
    id: int64
    fansub_group_id: int64
    handle: string
    role: string
    since_year: int32 | null
    until_year: int32 | null
    notes: string | null
    created_at: datetime
    updated_at: datetime
  FansubAlias:
    id: int64
    fansub_group_id: int64
    alias: string
    created_at: datetime
    updated_at: datetime
  AnimeFansub:
    anime_id: int64
    fansub_group_id: int64
    is_primary: bool
    notes: string | null
    created_at: datetime
    fansub_group: FansubGroup
  PaginationMeta:
    total: int64
    page: int32
    per_page: int32
    total_pages: int32
  FansubMediaKind:
    enum: [logo, banner]
  MediaAsset:
    id: int64
    filename: string
    public_url: string
    mime_type: string
    size_bytes: int64
    width: int32 | null
    height: int32 | null
    created_at: datetime
  FansubMediaUploadResponse:
    data:
      kind: FansubMediaKind
      media: MediaAsset
      gif_large_warning: bool

# ---- Invitation Endpunkte (Phase 60) ----------------------------------------

  - name: fansub-group-invitations-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/invitations
    auth:
      required: true
      permission: can_view_invitations for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubGroupInvitationListResponse

  - name: fansub-group-invitations-create
    method: POST
    path: /api/v1/admin/fansubs/{id}/invitations
    description: |
      Erstellt eine Einladung und sendet die Einladungsmail per SMTP.
      Schlaegt der SMTP-Versand fehl, wird die Einladung sofort storniert (kein stiller
      pending-Record) und der Endpunkt gibt 502 mit reason_code=mail_delivery_failed zurueck.
      invite_link ist ein absoluter Einmal-Link (APP_PUBLIC_URL + Accept-Pfad + Raw-Token)
      als Entwickler/Copy-Fallback. Der Roh-Token wird weder in der Datenbank noch im
      Audit-Log gespeichert.
    auth:
      required: true
      permission: can_create_invitation for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: FansubGroupInvitationCreateRequest
    response:
      status: 201
      type: FansubGroupInvitationCreateResponse
    error_responses:
      - status: 409
        description: Offene Einladung fuer diese E-Mail-Adresse existiert bereits
      - status: 502
        description: SMTP-Versand fehlgeschlagen; Einladung wurde automatisch storniert (reason_code=mail_delivery_failed)

  - name: fansub-group-invitations-cancel
    method: POST
    path: /api/v1/admin/fansubs/{id}/invitations/{invitationId}/cancel
    auth:
      required: true
      permission: can_cancel_invitation for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: invitationId
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubGroupInvitationResponse

  - name: fansub-invitation-accept
    method: POST
    path: /api/v1/invitations/accept
    description: |
      Nimmt eine Fansub-Gruppeneinladung anhand des Einmal-Tokens aus der Einladungsmail oder
      dem invite_link-Fallback an. Der Token ist einmalig und laeuft nach 7 Tagen ab.
    auth:
      required: true
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
    request_body:
      required: true
      type: AcceptFansubInvitationRequest
    response:
      status: 200
      type: AcceptFansubInvitationResponse

# ---- App-Member Endpunkte (Phase 45) ----------------------------------------

  - name: fansub-group-capabilities
    method: GET
    path: /api/v1/admin/fansubs/{id}/capabilities
    auth:
      required: true
      permission: any workspace capability for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubGroupCapabilitiesResponse

  - name: fansub-app-members-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/app-members
    auth:
      required: true
      permission: can_view_members for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: FansubAppMemberListResponse

  - name: fansub-app-members-create
    method: POST
    path: /api/v1/admin/fansubs/{id}/app-members
    auth:
      required: true
      permission: can_manage_members for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: FansubAppMemberCreateRequest
    response:
      status: 201
      type: FansubAppMemberResponse

  - name: fansub-app-member-media-permissions-update
    method: PUT
    path: /api/v1/admin/fansubs/{id}/app-members/{appUserId}/media-permissions
    auth:
      required: true
      permission: can_manage_members for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: appUserId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: FansubGroupMediaPermissions
    response:
      status: 200
      type: FansubAppMemberResponse

  - name: fansub-group-members-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/group-members
    auth:
      required: true
      permission: fansub_group.members.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    response:
      status: 200
      type: HistFansubGroupMemberListResponse
    notes:
      - Returns historical group members enriched with display_name from the members table.

  - name: fansub-group-members-create
    method: POST
    path: /api/v1/admin/fansubs/{id}/group-members
    auth:
      required: true
      permission: fansub_group.historical_members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: CreateGroupMemberRequest
    response:
      status: 201
      type: HistFansubGroupMemberResponse
    error_responses:
      - status: 409
        description: Member already exists in this fansub group.
      - status: 422
        description: Invalid status, visibility, or year range.
    notes:
      - display_name creates a members row automatically with nickname=display_name and user_id=null.
      - Cross-group consistency is enforced by the Phase-69 composite guard/constraint.

  - name: fansub-group-members-update
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/group-members/{memberId}
    auth:
      required: true
      permission: fansub_group.historical_members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: memberId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: UpdateGroupMemberRequest
    response:
      status: 200
      type: HistFansubGroupMemberResponse
    error_responses:
      - status: 404
        description: Membership entry not found in the addressed fansub group.

  - name: fansub-group-members-delete
    method: DELETE
    path: /api/v1/admin/fansubs/{id}/group-members/{memberId}
    auth:
      required: true
      permission: fansub_group.historical_members.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: memberId
        type: int64
        minimum: 1
    response:
      status: 204
      type: none
    error_responses:
      - status: 404
        description: Membership entry not found in the addressed fansub group.

  - name: fansub-member-roles-list
    method: GET
    path: /api/v1/admin/fansubs/{id}/member-roles
    auth:
      required: true
      permission: fansub_group.members.view for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    query_params:
      - name: member_id
        type: int64
        required: true
        minimum: 1
    response:
      status: 200
      type: HistGroupMemberRoleListResponse
    error_responses:
      - status: 400
        description: member_id query parameter is missing or invalid.

  - name: fansub-member-roles-create
    method: POST
    path: /api/v1/admin/fansubs/{id}/member-roles
    auth:
      required: true
      permission: fansub_group.historical_roles.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
    request_body:
      required: true
      type: CreateMemberRoleRequest
    response:
      status: 201
      type: HistGroupMemberRoleResponse
    error_responses:
      - status: 404
        description: Membership entry not found.
      - status: 422
        description: Role code is invalid for group_history or membership belongs to another fansub group.
    notes:
      - hist_fansub_group_member_id must belong to the fansub group in the route.
      - role_code must be valid for the group_history context.

  - name: fansub-member-roles-update
    method: PATCH
    path: /api/v1/admin/fansubs/{id}/member-roles/{roleId}
    auth:
      required: true
      permission: fansub_group.historical_roles.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: roleId
        type: int64
        minimum: 1
    request_body:
      required: true
      type: UpdateMemberRoleRequest
    response:
      status: 200
      type: HistGroupMemberRoleResponse
    error_responses:
      - status: 404
        description: Role entry not found in the addressed fansub group.

  - name: fansub-member-roles-delete
    method: DELETE
    path: /api/v1/admin/fansubs/{id}/member-roles/{roleId}
    auth:
      required: true
      permission: fansub_group.historical_roles.manage for the addressed fansub group
      header:
        name: Authorization
        format: Bearer <signed token>
      unauthenticated_status: 401
      forbidden_status: 403
    path_params:
      - name: id
        type: int64
        minimum: 1
      - name: roleId
        type: int64
        minimum: 1
    response:
      status: 204
      type: none
    error_responses:
      - status: 404
        description: Role entry not found in the addressed fansub group.

