      invite_link ist absoluter Einmal-Link (APP_PUBLIC_URL + Accept-Pfad + Raw-Token).
      Nur als Dev/Copy-Fallback -- primaerer Kanal ist die Einladungsmail.
      Der Roh-Token wird nicht in der Datenbank oder im Audit-Log gespeichert.
